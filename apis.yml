    name: datos.gub.uy - Catálogo de Datos Abiertos CKAN Action API
    description: >-
      CKAN Action API for datos.gub.uy - Catálogo de Datos Abiertos, a consistent JSON-over-HTTP interface over a catalog of 2,679 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://catalogodatos.gub.uy/api/3/action/.
