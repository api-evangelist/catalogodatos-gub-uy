aid: catalogodatos-gub-uy
name: datos.gub.uy - Catálogo de Datos Abiertos
description: >-
  datos.gub.uy - Catálogo de Datos Abiertos is a open data portal open-data portal running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 2,679 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
